apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: kafka-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      containers:
      - name: dashboard
        image: kafka-platform/dashboard-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: KAFKA_TOPIC
          value: "events"
        - name: PROMETHEUS_URL
          value: "http://prometheus:9090"
        - name: LOGLEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: kafka-platform
spec:
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: dashboard-service
  type: ClusterIP
